<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body class="screen-3-emotions">
  <div id="left-row">
    <div id="adjust-emotions-input-box">
      <input type="text"
              id="emotions-input-box"
              maxlength="105"
              autocomplete="off">
    </div>
  </div>
  <div id="emotions-container"></div>
  <div id="middle-row">
    <button class="home-colored-button">
      <img
        src="assets/images/ai-generated/home-thoughts.png"
        alt="home">
    </button>
    <div id="cloud-drop-zone">
      <span id="drop-text">drop here</span>
    </div>
    <button id="thought-release-or-save">Release</button>
  </div>
  <div id="thoughts-collected-container"></div>
</body>
</html>
